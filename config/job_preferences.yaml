locations:
  # India cities are always searched first — primary market
  india_priority:
    - "Bengaluru"
    - "Mumbai"
    - "Hyderabad"
    - "Pune"
    - "Delhi NCR"
    - "Noida"
    - "Chennai"
    - "Kolkata"
    - "Ahmedabad"
    - "Kochi"
  preferred:
    - "Bengaluru"
    - "Mumbai"
    - "Hyderabad"
    - "Pune"
    - "Delhi NCR"
    - "Chennai"
    - "Remote"
