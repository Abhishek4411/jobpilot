  - "cloud"
  - "AI"
  - "ML"
  - "GenAI"
  - "RAG"
  - "business analyst"
  - "migration"
  - "VMware"
  - "Python"
  - "LLM"
  - "content"
  - "knowledge base"

portals:
  naukri: true
  linkedin: true
  indeed: true
  glassdoor: false    # disabled: consistently blocked by Glassdoor anti-scraping (2026-03)
  google_jobs: true
  wellfound: true
